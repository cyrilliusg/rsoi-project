apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgres.fullname" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  # Headless service so that StatefulSet gives stable DNS:
  #   postgres-0.postgres.<ns>.svc.cluster.local
  clusterIP: None
  selector:
    {{- include "postgres.selectorLabels" . | nindent 4 }}
  ports:
    - name: pg
      port: {{ .Values.service.port }}
      targetPort: pg
      protocol: TCP
