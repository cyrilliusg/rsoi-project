apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres.fullname" . }}-credentials
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.superuser.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.superuser.password | quote }}
  POSTGRES_DB: {{ .Values.superuser.database | quote }}
  APP_DB_USER: {{ .Values.appUser.username | quote }}
  APP_DB_PASSWORD: {{ .Values.appUser.password | quote }}
