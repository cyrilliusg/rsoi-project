fullnameOverride: car-service

image:
  repository: ghcr.io/CHANGE-ME/car-service
  tag: latest

replicaCount: 1

extraConfigMap:
  enabled: true
  data:
    DJANGO_SECRET_KEY: "k8s-change-me"
    MODE: "docker"
    DJANGO_ALLOWED_HOSTS: "*"
    DB_CARS: "cars"
    DB_USER: "program"
    DB_DOCKER_HOST: "postgres.rsoi-data"
    DB_LOCAL_HOST: "localhost"
    DB_PORT: "5432"
    IDP_ISSUER: "https://id.example.com"
    IDP_JWKS_URI: "http://identity-provider:8000/api/v1/jwks"
    IDP_AUDIENCE: "spa"

# DB password expected from externally-managed Secret `postgres-credentials`
# (provisioned by helm/postgres). The key in that Secret is APP_DB_PASSWORD,
# we re-map it to DB_PASSWORD via env below.
env:
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-credentials
        key: APP_DB_PASSWORD
