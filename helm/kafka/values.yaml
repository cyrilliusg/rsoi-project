# Values passed down to the Bitnami kafka subchart.
# Reference: https://github.com/bitnami/charts/tree/main/bitnami/kafka
kafka:
  # Bitnami removed old image tags from the free `bitnami/<image>` repo
  # in 2025 (chart still pins `4.0.0-debian-12-r10`, which 404s).
  # `bitnamilegacy/<image>` is Bitnami's free mirror for purged tags —
  # no security updates, fine for a learning workload.
  # See: https://github.com/bitnami/charts/issues/35164
  image:
    repository: bitnamilegacy/kafka
  # Init container `prepareConfig` uses the same image; explicit override
  # to be safe if the default ever stops inheriting.
  defaultInitContainers:
    prepareConfig:
      image:
        repository: bitnamilegacy/kafka

  listeners:
    client:
      protocol: PLAINTEXT
    controller:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
    external:
      protocol: PLAINTEXT

  # KRaft combined mode — controller and broker in one pod, simpler and
  # plenty for this learning workload. 1 node for replication=1 on the
  # `rental-events` topic.
  controller:
    replicaCount: 1
    persistence:
      enabled: true
      size: 5Gi
  broker:
    replicaCount: 0      # combined mode -> no dedicated broker pods

  # Auto-create topics is convenient — gateway-producer will create
  # `rental-events` on first publish (3 partitions per defaults below).
  extraConfig: |
    auto.create.topics.enable=true
    num.partitions=3
    default.replication.factor=1
    min.insync.replicas=1

  # All listeners above are PLAINTEXT, so SASL config is unused at the
  # wire level — leave the subchart defaults (SCRAM-SHA-256) to satisfy
  # its own validation. No cert generation either.
  tls:
    autoGenerated:
      enabled: false
