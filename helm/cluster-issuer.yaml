# cert-manager ClusterIssuers for Let's Encrypt.
# Apply with: kubectl apply -f helm/cluster-issuer.yaml
# Prereqs: cert-manager installed and ingress-nginx serving HTTP-01 challenges.
#
# Staging is rate-limit-friendly — start here, switch ingress annotation to
# `letsencrypt-prod` only when staging cert appears and serves.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: CHANGE-ME@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: CHANGE-ME@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
