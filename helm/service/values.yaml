# Default values for the universal service chart.
# Each workload overrides what it needs in helm/values/<workload>.yaml.

# fullnameOverride forces the resource names to exactly this string; useful
# so that gateway-service ends up as `gateway-service`, not
# `<release>-service-<chart>`.
nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/CHANGE-ME/CHANGE-ME
  tag: latest
  pullPolicy: IfNotPresent

# Optional override of the container CMD (used to switch between web/worker
# roles that share the same image, e.g. gateway and gateway_worker).
command: []
args: []

containerPort: 8000

replicaCount: 1

# Inline env vars — list of {name, value} or {name, valueFrom: {...}}.
env: []

# Pull env from one or more existing ConfigMap / Secret resources.
envFromConfigMap: ""
envFromSecret: ""

# Optional inline ConfigMap created by the chart itself; data is a flat
# key/value map of env-var names. Helpful for non-secret env that the
# workload owns (issuer URLs, feature flags etc.).
extraConfigMap:
  enabled: false
  data: {}

# Optional inline Secret created by the chart. Stored base64 by Helm —
# don't put real production secrets here, use externally-managed secrets
# and refer via envFromSecret.
extraSecret:
  enabled: false
  stringData: {}

# Mount one or more existing Secrets as files (e.g. JWT private key for
# identity-provider). Each entry: {name, mountPath, secretName, items?}.
volumeMounts: []
volumes: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  enabled: true
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: my-tls
    #   hosts: [example.com]

probes:
  liveness:
    enabled: true
    path: /manage/health
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    path: /manage/health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: false
  name: ""
