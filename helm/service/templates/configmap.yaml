{{- if .Values.extraConfigMap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service.fullname" . }}-config
  labels:
    {{- include "service.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.extraConfigMap.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
