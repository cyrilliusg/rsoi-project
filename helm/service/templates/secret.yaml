{{- if .Values.extraSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "service.fullname" . }}-secret
  labels:
    {{- include "service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.extraSecret.stringData }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
