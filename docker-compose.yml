name: rsoi-project

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB} # БД по умолчанию для 1 запуска
      POSTGRES_USER: ${POSTGRES_USER} # Пользователь по умолчанию для 1 запуска
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Пароль по умолчанию для 1 запуска
    volumes:
      - pgdata:/var/lib/postgresql/data       # монтирование тома с данными на хосте
      - ./postgres/:/docker-entrypoint-initdb.d:ro # Скрипты для 1 запуска. Если pgdata не пустой то не запустится
    shm_size: "256m"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [ internal ]

  car-service:
    container_name: car-service
    build:
      context: ./services/car-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./services/shared
    restart: unless-stopped
    environment:
      # Пользователи/БД приложения:
      DB_CARS: "cars"
      DB_USER: "program"
      DB_PASSWORD: "test"
      DB_DOCKER_HOST: "postgres"
      DB_LOCAL_HOST: "localhost"
      DB_PORT: "5432"
      # для сервисов
      DJANGO_SECRET_KEY: "test"
      MODE: "docker"
      DJANGO_ALLOWED_HOSTS: "*"
      # IdP
      IDP_ISSUER: "http://localhost:8090"
      IDP_JWKS_URI: "http://identity-provider:8000/api/v1/jwks"
      IDP_AUDIENCE: "spa"
    ports:
      - "8050:8000"
    read_only: true
    tmpfs: [ "/tmp", "/run" ]
    healthcheck:
      test: [ "CMD-SHELL", "python - <<'EOF'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://car-service:8000/manage/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nEOF" ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      internal:
        aliases:
          - car-service
    depends_on:
      postgres:
        condition: service_healthy
        restart: true

  rental-service:
    container_name: rental-service
    build:
      context: ./services/rental-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./services/shared
    restart: unless-stopped
    environment:
      # Пользователи/БД приложения:
      DB_RENTALS: "rentals"
      DB_USER: "program"
      DB_PASSWORD: "test"
      DB_DOCKER_HOST: "postgres"
      DB_LOCAL_HOST: "localhost"
      DB_PORT: "5432"
      # для сервисов
      DJANGO_SECRET_KEY: "test"
      MODE: "docker"
      DJANGO_ALLOWED_HOSTS: "*"
      # IdP
      IDP_ISSUER: "http://localhost:8090"
      IDP_JWKS_URI: "http://identity-provider:8000/api/v1/jwks"
      IDP_AUDIENCE: "spa"
    ports:
      - "8060:8000"
    read_only: true
    tmpfs: [ "/tmp", "/run" ]
    healthcheck:
      test: [ "CMD-SHELL", "python - <<'EOF'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://rental-service:8000/manage/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nEOF" ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      internal:
        aliases:
          - rental-service
    depends_on:
      postgres:
        condition: service_healthy
        restart: true

  payment-service:
    container_name: payment-service
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./services/shared
    restart: unless-stopped
    environment:
      # Пользователи/БД приложения:
      DB_PAYMENTS: "payments"
      DB_USER: "program"
      DB_PASSWORD: "test"
      DB_DOCKER_HOST: "postgres"
      DB_LOCAL_HOST: "localhost"
      DB_PORT: "5432"
      # для сервисов
      DJANGO_SECRET_KEY: "test"
      MODE: "docker"
      DJANGO_ALLOWED_HOSTS: "*"
      # IdP
      IDP_ISSUER: "http://localhost:8090"
      IDP_JWKS_URI: "http://identity-provider:8000/api/v1/jwks"
      IDP_AUDIENCE: "spa"
    ports:
      - "8070:8000"
    read_only: true
    tmpfs: [ "/tmp", "/run" ]
    healthcheck:
      test: [ "CMD-SHELL", "python - <<'EOF'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://payment-service:8000/manage/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nEOF" ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      internal:
        aliases:
          - payment-service
    depends_on:
      postgres:
        condition: service_healthy
        restart: true

  gateway-service:
    container_name: gateway-service
    build:
      context: ./services/gateway-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./services/shared
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: "test"
      MODE: "docker"
      DJANGO_ALLOWED_HOSTS: "*"
      CAR_SERVICE_URL: "http://car-service:8000/api/v1"
      RENTAL_SERVICE_URL: "http://rental-service:8000/api/v1"
      PAYMENT_SERVICE_URL: "http://payment-service:8000/api/v1"
      REDIS_URL: "redis://redis:6379/0"
      ROLE: "web"
      IDP_ISSUER: "http://localhost:8090"
      IDP_JWKS_URI: "http://identity-provider:8000/api/v1/jwks"
      IDP_AUDIENCE: "spa"
      GATEWAY_CORS_ORIGINS: "http://localhost:3000"
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "rental-events"
      KAFKA_CLIENT_ID: "gateway-service"
      STATISTICS_SERVICE_URL: "http://statistics-service:8000/api/v1"
    ports:
      - "8080:8000"
    tmpfs: [ "/tmp", "/run" ]
    healthcheck:
      test: [ "CMD-SHELL", "python - <<'EOF'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://gateway-service:8000/manage/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nEOF" ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      internal:
        aliases:
          - gateway-service
    depends_on:
      postgres:
        condition: service_healthy
        restart: true

  redis:
    image: redis:8.2.3-alpine
    container_name: redis
    restart: unless-stopped
    command: [ "redis-server","--appendonly","yes","--appendfsync","everysec" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks: [ internal ]

  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: kafka
    restart: unless-stopped
    environment:
      # KRaft single-node (broker + controller in one process).
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 >/dev/null 2>&1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [ internal ]

  identity-provider:
    container_name: identity-provider
    build:
      context: ./services/identity-provider
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_IDENTITY: "identity"
      DB_USER: "program"
      DB_PASSWORD: "test"
      DB_DOCKER_HOST: "postgres"
      DB_LOCAL_HOST: "localhost"
      DB_PORT: "5432"
      DJANGO_SECRET_KEY: "test"
      MODE: "docker"
      DJANGO_ALLOWED_HOSTS: "*"
      IDP_ISSUER: "http://localhost:8090"
      IDP_ACCESS_TOKEN_TTL: "3600"
      JWT_PRIVATE_KEY_PATH: "/app/keys/private.pem"
      JWT_PUBLIC_KEY_PATH: "/app/keys/public.pem"
      IDP_ADMIN_USERNAME: "admin"
      IDP_ADMIN_PASSWORD: "admin"
      IDP_ADMIN_EMAIL: "admin@example.com"
      IDP_CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8090:8000"
    volumes:
      - ./services/identity-provider/keys:/app/keys:ro
    tmpfs: [ "/tmp", "/run" ]
    healthcheck:
      test: [ "CMD-SHELL", "python - <<'EOF'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://identity-provider:8000/manage/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nEOF" ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      internal:
        aliases:
          - identity-provider
    depends_on:
      postgres:
        condition: service_healthy
        restart: true

  gateway_worker:
    container_name: gateway_worker-service
    build:
      context: ./services/gateway-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./services/shared
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: "test"
      MODE: "docker"
      DJANGO_ALLOWED_HOSTS: "*"
      CAR_SERVICE_URL: "http://car-service:8000/api/v1"
      RENTAL_SERVICE_URL: "http://rental-service:8000/api/v1"
      PAYMENT_SERVICE_URL: "http://payment-service:8000/api/v1"
      REDIS_URL: "redis://redis:6379/0"
      ROLE: "worker"
      IDP_ISSUER: "http://localhost:8090"
      IDP_JWKS_URI: "http://identity-provider:8000/api/v1/jwks"
      IDP_AUDIENCE: "spa"
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "rental-events"
      KAFKA_CLIENT_ID: "gateway-worker"
    depends_on:
      - redis
      - gateway-service
    networks: [ internal ]

  statistics-service:
    container_name: statistics-service
    build:
      context: ./services/statistics-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./services/shared
    restart: unless-stopped
    environment:
      DB_STATISTICS: "statistics"
      DB_USER: "program"
      DB_PASSWORD: "test"
      DB_DOCKER_HOST: "postgres"
      DB_LOCAL_HOST: "localhost"
      DB_PORT: "5432"
      DJANGO_SECRET_KEY: "test"
      MODE: "docker"
      DJANGO_ALLOWED_HOSTS: "*"
      ROLE: "web"
      IDP_ISSUER: "http://localhost:8090"
      IDP_JWKS_URI: "http://identity-provider:8000/api/v1/jwks"
      IDP_AUDIENCE: "spa"
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "rental-events"
      KAFKA_CONSUMER_GROUP: "statistics-service-cg"
    ports:
      - "8100:8000"
    tmpfs: [ "/tmp", "/run" ]
    healthcheck:
      test: [ "CMD-SHELL", "python - <<'EOF'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://statistics-service:8000/manage/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nEOF" ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      internal:
        aliases:
          - statistics-service
    depends_on:
      postgres:
        condition: service_healthy
        restart: true

  statistics_consumer:
    container_name: statistics-consumer
    build:
      context: ./services/statistics-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./services/shared
    restart: unless-stopped
    environment:
      DB_STATISTICS: "statistics"
      DB_USER: "program"
      DB_PASSWORD: "test"
      DB_DOCKER_HOST: "postgres"
      DB_LOCAL_HOST: "localhost"
      DB_PORT: "5432"
      DJANGO_SECRET_KEY: "test"
      MODE: "docker"
      DJANGO_ALLOWED_HOSTS: "*"
      ROLE: "consumer"
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "rental-events"
      KAFKA_CONSUMER_GROUP: "statistics-service-cg"
      KAFKA_AUTO_OFFSET_RESET: "earliest"
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      statistics-service:
        condition: service_started
    networks: [ internal ]

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_IDP_ISSUER: "http://localhost:8090"
        NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8080"
        NEXT_PUBLIC_OAUTH_CLIENT_ID: "spa"
        NEXT_PUBLIC_OAUTH_REDIRECT_URI: "http://localhost:3000/auth/callback"
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      internal:
        aliases:
          - frontend
    depends_on:
      - gateway-service
      - identity-provider

volumes:
  pgdata:

networks:
  internal: