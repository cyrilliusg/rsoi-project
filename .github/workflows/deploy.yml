name: Build and deploy to k8s

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: car-service
            context: services/car-service
          - service: rental-service
            context: services/rental-service
          - service: payment-service
            context: services/payment-service
          - service: gateway-service
            context: services/gateway-service
          - service: statistics-service
            context: services/statistics-service
          - service: identity-provider
            context: services/identity-provider
          - service: frontend
            context: frontend
            # NEXT_PUBLIC_* are baked into the JS bundle at `npm run build`
            # time, so the prod URLs must be passed here. Update these if
            # the domain changes.
            build_args: |
              NEXT_PUBLIC_IDP_ISSUER=https://id.aetero.ru
              NEXT_PUBLIC_GATEWAY_URL=https://api.aetero.ru
              NEXT_PUBLIC_OAUTH_CLIENT_ID=spa
              NEXT_PUBLIC_OAUTH_REDIRECT_URI=https://app.aetero.ru/auth/callback
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          # `shared=` is referenced by Django services' Dockerfiles via
          # `COPY --from=shared`. Unused contexts are silently ignored by
          # buildx, so passing it for every workload is safe.
          build-contexts: |
            shared=services/shared
          # Empty string for matrix entries without build_args — the action
          # treats empty input as "no extra build-args".
          build-args: ${{ matrix.build_args || '' }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: helm upgrade
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on push to main, not on manual workflow_dispatch unless
    # explicitly requested. Flip to `if: always()` if you want manual
    # triggers to deploy too.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Pull kafka chart dependency
        run: helm dependency update helm/kafka

      - name: Deploy
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
        run: ./scripts/k8s-deploy.sh
